# Copy the blocks you need into Streamlit Cloud → Your app → Settings → Secrets.
# Use valid TOML: strings in double quotes. Do not commit a real secrets.toml file.

# --- Optional: AI tab (OpenAI or compatible API) ---
OPENAI_API_KEY = "sk-your-key-here"

# Same key under the name the CLI also accepts (either one works in the dashboard):
# SIGNALHUB_OPENAI_API_KEY = "sk-your-key-here"

# Optional overrides (defaults shown in the UI if unset):
# SIGNALHUB_OPENAI_BASE_URL = "https://api.openai.com/v1"
# SIGNALHUB_AI_MODEL = "gpt-4o-mini"

# --- Optional: SQLite path (only if that file EXISTS on the server) ---
# On Community Cloud the default ./data/db/signalhub.sqlite does not exist — omit these and
# upload a .sqlite in the sidebar. If you use Streamlit persistent storage, set the real mount path:
# SIGNALHUB_DB = "/mount/path/signalhub.sqlite"
# SIGNALHUB_REVIEW_DB = "/mount/path/signalhub.sqlite"
